name: Build Free iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create habit-build com.custom.habittracker HabitTracker
          cd habit-build
          
          # Use the legacy-compatible platform version
          cordova platform add ios@6.3.0
          rm -rf www/*
          
          # Smart check: detect file or folder layout
          if [ -d "../www" ]; then
            cp -R ../www/* www/
          elif [ -f "../index.html" ]; then
            cp ../index.html www/index.html
          else
            ROOT_HTML=$(find .. -maxdepth 1 -name "*.html" | head -n 1)
            if [ ! -z "$ROOT_HTML" ]; then
              cp "$ROOT_HTML" www/index.html
            else
              echo "Error: Could not find any HTML files to build!"
              exit 1
            fi
          fi
          
          # Configuration targeting a highly compatible target layer
          echo '<?xml version="1.0" encoding="utf-8"?><widget id="com.custom.habittracker" version="1.0.0" xmlns="http://www.w3.org/ns/widgets"><name>HabitTracker</name><description>Habit Tracker</description><content src="index.html" /><preference name="deployment-target" value="11.0" /><preference name="AllowInlineMediaPlayback" value="true" /></widget>' > config.xml
          
          cordova build ios --emulator

      - name: Package IPA Archive
        run: |
          mkdir -p Payload
          # Deep search for any compiled .app folder anywhere inside the build tree
          APP_PATH=$(find habit-build/platforms/ios/build -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find the compiled .app file anywhere!"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r HabitTracker.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-HabitTracker-IPA
          path: HabitTracker.ipa
