name: Build Free iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create habit-build com.custom.habittracker HabitTracker
          cd habit-build
          cordova platform add ios
          rm -rf www/*
          
          # Smart check: look for a www folder first, then look for a root index.html
          if [ -d "../www" ]; then
            cp -R ../www/* www/
          elif [ -f "../index.html" ]; then
            cp ../index.html www/index.html
          else
            echo "Error: Could not find your index.html file in the repository!"
            exit 1
          fi
          
          cordova build ios --emulator

      - name: Package IPA Archive
        run: |
          mkdir -p Payload
          cp -R habit-build/platforms/ios/build/emulator/*.app Payload/
          zip -r HabitTracker.ipa Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-HabitTracker-IPA
          path: HabitTracker.ipa
