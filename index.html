<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Routine & Habit Tracker</title>
  <style>
    /* Global Styles & Theming */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      color: #fff;
      display: flex;
      align-items: center;
    }
    .logo {
      height: 32px;
      margin-right: 12px;
    }
    .date-label {
      font-size: 14px;
      color: #aaa;
    }
    
    /* Control Row & Buttons */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      background-color: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .btn:hover {
      background-color: #333;
      border-color: #555;
    }
    .btn.gold {
      background-color: #c5a059;
      color: #121212;
      border-color: #c5a059;
      font-weight: bold;
    }
    .btn.gold:hover {
      background-color: #d4b26f;
    }
    .btn.small {
      padding: 4px 8px;
      font-size: 12px;
    }
    
    /* Status Message Banner */
    #statusMessage {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }
    .status-success {
      background-color: #1b4332;
      color: #75e6da;
      border: 1px solid #2d6a4f;
    }
    .status-error {
      background-color: #4c1d1d;
      color: #ff9999;
      border: 1px solid #7a2828;
    }

    /* Routine Cards Layout */
    .routines-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    @media (min-width: 600px) {
      .routines-grid { grid-template-columns: 1fr 1fr; }
    }
    .card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    .card-actions {
      display: flex;
      gap: 6px;
    }
    
    /* Habits List Layout */
    ul.habits {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
      flex-grow: 1;
    }
    ul.habits li {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    ul.habits li:last-child {
      border-bottom: none;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #666;
      border-radius: 3px;
      margin-right: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .checkbox.checked {
      background-color: #c5a059;
      border-color: #c5a059;
    }
    .checkbox.checked::after {
      content: "✓";
      color: #121212;
      font-size: 14px;
      font-weight: bold;
    }
    .habit-label {
      flex-grow: 1;
      font-size: 14px;
    }
    .habit-label.done {
      text-decoration: line-through;
      color: #777;
    }
    .habit-del {
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
    }
    .habit-del:hover {
      color: #ff6b6b;
    }
    
    /* Inline Inputs & Form Rows */
    .inline-form-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    .inline-input {
      background-color: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 14px;
      flex-grow: 1;
    }
    .add-habit-row {
      margin-top: auto;
      padding-top: 10px;
    }
    .empty-note {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-bottom: 12px;
    }
    
    /* Water Tracker Section */
    .water-section {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 30px;
    }
    .water-row {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }
    .bottle {
      font-size: 32px;
      cursor: pointer;
      opacity: 0.3;
      filter: grayscale(100%);
      transition: opacity 0.2s, filter 0.2s;
      user-select: none;
    }
    .bottle.filled {
      opacity: 1;
      filter: grayscale(0%);
    }
    .water-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #aaa;
    }
    .water-streak {
      background-color: #2b4c7e;
      color: #99ccff;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
    .water-streak.zero {
      background-color: #333;
      color: #777;
    }

    /* JSON Box fallback panel */
    #jsonBox {
      display: none;
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-top: 20px;
    }
    #jsonText {
      width: 100%;
      height: 150px;
      background-color: #121212;
      color: #a2b4c7;
      font-family: monospace;
      border: 1px solid #444;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    
    /* Utility Inputs Hidden */
    #fileInput {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1><img id="appLogo" class="logo" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'></svg>"/>Habit Engine</h1>
    <div id="todayLabel" class="date-label"></div>
  </header>

  <div class="controls">
    <div id="btnAddRoutine" class="btn gold">+ New Routine</div>
    <div id="btnResetToday" class="btn">Reset Today</div>
    <div id="btnSave" class="btn">Export File</div>
    <div id="btnLoad" class="btn">Import File</div>
    <div id="btnJson" class="btn">Show/Hide JSON Block</div>
    <input type="file" id="fileInput" accept=".json" />
  </div>

  <div id="statusMessage"></div>

  <div id="routinesGrid" class="routines-grid"></div>

  <div class="water-section">
    <h3>Water Hydration Target</h3>
    <div id="waterRow" class="water-row"></div>
    <div class="water-meta">
      <span id="waterCount">0 of 4 bottles met today</span>
      <span id="waterStreak" class="water-streak zero">no water streak yet</span>
    </div>
    <div style="margin-top:12px;">
      <div id="btnResetWaterStreak" class="btn small">Reset Streak</div>
    </div>
  </div>

  <div id="jsonBox">
    <h4>Manual Workspace Context</h4>
    <p style="font-size:12px; color:#aaa; margin-top:0;">Paste accurate JSON configurations below to manually apply or inspect backup states:</p>
    <textarea id="jsonText"></textarea>
    <div id="btnApplyJson" class="btn small gold">Apply Pasted JSON</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // Tiny inline standard SVG asset definition placeholder for theme compatibility
  var APP_LOGO_DATA_URI = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c5a059'><path d='M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z'/></svg>";

  var store = {
    routines: [],
    days: {},
    waterStreakResetBefore: null
  };

  var dayData = {
    entries: {},
    water: 0,
    completedWater: false
  };

  var activeHabitInputId = null;
  var statusTimeout = null;

  function defaultRoutines() {
    return [
      {
        id: "r_morning",
        name: "Morning Routine",
        habits: [
          { id: "h_m1", label: "Make bed" },
          { id: "h_m2", label: "Drink full glass water" },
          { id: "h_m3", label: "Stretch 5 mins" }
        ]
      },
      {
        id: "r_evening",
        name: "Evening Routine",
        habits: [
          { id: "h_e1", label: "Clear desk surface" },
          { id: "h_e2", label: "Read 10 pages" },
          { id: "h_e3", label: "Plan next day" }
        ]
      }
    ];
  }

  function getTodayKey() {
    var d = new Date();
    var yyyy = d.getFullYear();
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    if (mm < 10) { mm = "0" + mm; }
    if (dd < 10) { dd = "0" + dd; }
    return yyyy + "-" + mm + "-" + dd;
  }

  function getTodayLabel() {
    var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    return new Date().toLocaleDateString(undefined, options);
  }

  function getYesterdayKey() {
    var d = new Date();
    d.setDate(d.getDate() - 1);
    var yyyy = d.getFullYear();
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    if (mm < 10) { mm = "0" + mm; }
    if (dd < 10) { dd = "0" + dd; }
    return yyyy + "-" + mm + "-" + dd;
  }

  function makeId(prefix) {
    return prefix + "_" + Math.random().toString(36).substr(2, 9);
  }

  function setStatus(msg, isSuccess) {
    var banner = document.getElementById("statusMessage");
    banner.textContent = msg;
    banner.className = isSuccess ? "status-success" : "status-error";
    banner.style.display = "block";

    if (statusTimeout) { window.clearTimeout(statusTimeout); }
    statusTimeout = window.setTimeout(function () {
      banner.style.display = "none";
    }, 4000);
  }

  function loadFromLocalStorage() {
    var raw = window.localStorage.getItem("habit_engine_data");
    if (raw) {
      try {
        var parsed = JSON.parse(raw);
        if (looksLikeOldFormat(parsed)) {
          store = migrateOldFormat(parsed);
        } else {
          store = parsed;
        }
      } catch (e) {
        store = { routines: defaultRoutines(), days: {} };
      }
    } else {
      store = { routines: defaultRoutines(), days: {} };
    }

    if (!store.routines || store.routines.length === 0) {
      store.routines = defaultRoutines();
    }
    if (!store.days) { store.days = {}; }

    ensureToday();
  }

  function looksLikeOldFormat(parsed) {
    return parsed && !parsed.routines && parsed.habits;
  }

  function migrateOldFormat(old) {
    var migratedRoutines = [
      { id: "r_morning", name: "Morning Routine", habits: [] },
      { id: "r_evening", name: "Evening Routine", habits: [] }
    ];

    var oldHabits = old.habits || [];
    var i;
    for (i = 0; i < oldHabits.length; i++) {
      var oh = oldHabits[i];
      var newH = { id: oh.id, label: oh.label };
      if (oh.id && oh.id.indexOf("h_m") === 0) {
        migratedRoutines[0].habits.push(newH);
      } else {
        migratedRoutines[1].habits.push(newH);
      }
    }

    var newDays = {};
    if (old.days) {
      var key;
      for (key in old.days) {
        if (Object.prototype.hasOwnProperty.call(old.days, key)) {
          var oldDay = old.days[key];
          newDays[key] = {
            entries: oldDay.entries || {},
            water: oldDay.water || 0,
            completedWater: oldDay.water >= 4
          };
        }
      }
    }

    return {
      routines: migratedRoutines,
      days: newDays,
      waterStreakResetBefore: old.waterStreakResetBefore || null
    };
  }

  function ensureToday() {
    var today = getTodayKey();
    if (!store.days[today]) {
      store.days[today] = {
        entries: {},
        water: 0,
        completedWater: false
      };
    }
    dayData = store.days[today];
    if (!dayData.entries) { dayData.entries = {}; }
  }

  function persistLocalStorage() {
    window.localStorage.setItem("habit_engine_data", JSON.stringify(store));
  }

  function checkDayRollover() {
    var label = document.getElementById("todayLabel");
    var currentLabelStr = getTodayLabel();
    if (label.textContent !== currentLabelStr) {
      label.textContent = currentLabelStr;
      ensureToday();
      renderAll();
    }
  }

  function resetAllToday() {
    if (window.confirm("Are you sure you want to reset all tracking entries for today?")) {
      dayData.entries = {};
      dayData.water = 0;
      dayData.completedWater = false;
      persistLocalStorage();
      renderAll();
      setStatus("Today's logging structures cleared.", true);
    }
  }

  function isRoutineCompleteOnDay(routine, dayKey) {
    var dObj = store.days[dayKey];
    if (!dObj || !dObj.entries) { return false; }
    if (!routine.habits || routine.habits.length === 0) { return false; }

    var i;
    for (i = 0; i < routine.habits.length; i++) {
      if (!dObj.entries[routine.habits[i].id]) {
        return false;
      }
    }
    return true;
  }

  function markRoutineCompletionIfDone(routine) {
    var today = getTodayKey();
    if (isRoutineCompleteOnDay(routine, today)) {
      // Intentionally reserved block hook to run calculations on completion
    }
  }

  function calculateRoutineStreak(routine) {
    if (routine.streakResetBefore) {
      var today = getTodayKey();
      if (today <= routine.streakResetBefore) { return 0; }
    }

    var streak = 0;
    var d = new Date();
    
    // Check if finished today
    var todayKey = getTodayKey();
    var finishedToday = isRoutineCompleteOnDay(routine, todayKey);

    if (finishedToday) {
      streak++;
    }

    // Go backward from yesterday
    d.setDate(d.getDate() - 1);
    while (true) {
      var yyyy = d.getFullYear();
      var mm = d.getMonth() + 1;
      var dd = d.getDate();
      if (mm < 10) { mm = "0" + mm; }
      if (dd < 10) { dd = "0" + dd; }
      var key = yyyy + "-" + mm + "-" + dd;

      if (routine.streakResetBefore && key <= routine.streakResetBefore) {
        break;
      }

      if (isRoutineCompleteOnDay(routine, key)) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }

    return streak;
  }

  function waterStreak() {
    var today = getTodayKey();
    if (store.waterStreakResetBefore && today <= store.waterStreakResetBefore) {
      return 0;
    }

    var streak = 0;
    var d = new Date();

    var todayDataObj = store.days[today];
    var finishedToday = (todayDataObj && todayDataObj.water >= 4);
    if (finishedToday) {
      streak++;
    }

    d.setDate(d.getDate() - 1);
    while (true) {
      var yyyy = d.getFullYear();
      var mm = d.getMonth() + 1;
      var dd = d.getDate();
      if (mm < 10) { mm = "0" + mm; }
      if (dd < 10) { dd = "0" + dd; }
      var key = yyyy + "-" + mm + "-" + dd;

      if (store.waterStreakResetBefore && key <= store.waterStreakResetBefore) {
        break;
      }

      var dayObj = store.days[key];
      if (dayObj && dayObj.water >= 4) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  /* Step confirm button engine utils to eliminate simple alerts */
  function wireStepConfirmButton(domBtn, labelStepsArray, finalCallback, defaultLabel, baseClass, activeClass) {
    var step = 0;
    domBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (step === 0) {
        step = 1;
        domBtn.textContent = labelStepsArray[0];
        domBtn.className = activeClass;
      } else if (step === 1) {
        if (labelStepsArray.length > 1) {
          step = 2;
          domBtn.textContent = labelStepsArray[1];
        } else {
          step = 0;
          domBtn.textContent = defaultLabel;
          domBtn.className = baseClass;
          finalCallback();
        }
      } else if (step === 2) {
        step = 0;
        domBtn.textContent = defaultLabel;
        domBtn.className = baseClass;
        finalCallback();
      }
    }, false);

    document.addEventListener("click", function () {
      if (step > 0) {
        step = 0;
        domBtn.textContent = defaultLabel;
        domBtn.className = baseClass;
      }
    }, false);
  }

  function renderRoutines() {
    var grid = document.getElementById("routinesGrid");
    grid.innerHTML = "";

    var i;
    for (i = 0; i < store.routines.length; i++) {
      grid.appendChild(buildRoutineCard(store.routines[i]));
    }
  }

  function buildRoutineCard(routine) {
    var card = document.createElement("div");
    card.className = "card";

    var headerRow = document.createElement("div");
    headerRow.className = "card-header-row";

    if (routine.isNew) {
      var inlineForm = document.createElement("div");
      inlineForm.className = "inline-form-row";

      var input = document.createElement("input");
      input.type = "text";
      input.className = "inline-input";
      input.placeholder = "Routine Title Name...";
      inlineForm.appendChild(input);

      var saveBtn = document.createElement("div");
      saveBtn.className = "btn small gold";
      saveBtn.textContent = "Save";
      
      var doSave = function () {
        var val = trimStr(input.value);
        if (val === "") { return; }
        routine.name = val;
        delete routine.isNew;
        persistLocalStorage();
        renderAll();
      };
      saveBtn.addEventListener("click", doSave, false);
      inlineForm.appendChild(saveBtn);

      var cancelBtn = document.createElement("div");
      cancelBtn.className = "btn small";
      cancelBtn.textContent = "✕";
      cancelBtn.addEventListener("click", function () {
        var idx = store.routines.indexOf(routine);
        if (idx > -1) { store.routines.splice(idx, 1); }
        renderAll();
      }, false);
      inlineForm.appendChild(cancelBtn);

      headerRow.appendChild(inlineForm);
      card.appendChild(headerRow);
      
      window.setTimeout(function () { input.focus(); }, 50);
      return card;
    }

    var titleSpan = document.createElement("div");
    titleSpan.className = "card-title";
    
    var rStreak = calculateRoutineStreak(routine);
    titleSpan.textContent = routine.name + (rStreak > 0 ? " 🔥 " + rStreak : "");
    headerRow.appendChild(titleSpan);

    var actionsWrapper = document.createElement("div");
    actionsWrapper.className = "card-actions";

    var rReset = document.createElement("div");
    rReset.className = "btn small";
    rReset.textContent = "↺ Reset";
    rReset.addEventListener("click", function () {
      if (routine.habits) {
        var hIdx;
        for (hIdx = 0; hIdx < routine.habits.length; hIdx++) {
          dayData.entries[routine.habits[hIdx].id] = false;
        }
        persistLocalStorage();
        renderAll();
        setStatus("Routine elements unchecked for today.", true);
      }
    }, false);
    actionsWrapper.appendChild(rReset);

    var rStreakReset = document.createElement("div");
    rStreakReset.className = "btn small";
    rStreakReset.textContent = "Reset Streak";
    wireStepConfirmButton(
      rStreakReset,
      ["Confirm Reset?"],
      function () {
        routine.streakResetBefore = getTodayKey();
        persistLocalStorage();
        renderAll();
        setStatus("Streak calculation counter zeroed out.", true);
      },
      "Reset Streak",
      "btn small",
      "btn small gold"
    );
    actionsWrapper.appendChild(rStreakReset);

    var rDel = document.createElement("div");
    rDel.className = "btn small";
    rDel.textContent = "✕";
    wireStepConfirmButton(
      rDel,
      ["Delete entire card?"],
      function () {
        var idx = store.routines.indexOf(routine);
        if (idx > -1) {
          if (routine.habits) {
            var hI;
            for (hI = 0; hI < routine.habits.length; hI++) {
              delete dayData.entries[routine.habits[hI].id];
            }
          }
          store.routines.splice(idx, 1);
          persistLocalStorage();
          renderAll();
          setStatus("Routine item removed permanently.", true);
        }
      },
      "✕",
      "btn small",
      "btn small gold"
    );
    actionsWrapper.appendChild(rDel);

    headerRow.appendChild(actionsWrapper);
    card.appendChild(headerRow);

    var list = document.createElement("ul");
    list.className = "habits";

    var habits = routine.habits || [];
    if (habits.length === 0 && !routine.isNew) {
      var empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = "No habits added here yet.";
      card.appendChild(empty);
    }

    var j;
    for (j = 0; j < habits.length; j++) {
      list.appendChild(buildHabitRow(routine, habits[j]));
    }
    card.appendChild(list);

    // Only render the "Add Habit" action row on fully saved/existing routines
    if (!routine.isNew) {
      var addHabitRow = document.createElement("div");
      addHabitRow.className = "add-habit-row";

      if (activeHabitInputId === routine.id) {
        var habitForm = document.createElement("div");
        habitForm.className = "inline-form-row";

        var hInput = document.createElement("input");
        hInput.type = "text";
        hInput.className = "inline-input";
        hInput.placeholder = "New Habit Name...";

        var hSave = document.createElement("div");
        hSave.className = "btn small gold";
        hSave.textContent = "Add";

        var hCancel = document.createElement("div");
        hCancel.className = "btn small";
        hCancel.textContent = "✕";

        var commitHabit = function () {
          var val = trimStr(hInput.value);
          if (val !== "") {
            var newHabit = { id: makeId("h"), label: val };
            routine.habits.push(newHabit);
            dayData.entries[newHabit.id] = false;
            markRoutineCompletionIfDone(routine);
            persistLocalStorage();
          }
          activeHabitInputId = null;
          renderAll();
        };

        hSave.addEventListener("click", commitHabit, false);
        hCancel.addEventListener("click", function () {
          activeHabitInputId = null;
          renderAll();
        }, false);

        hInput.addEventListener("keydown", function (e) {
          if (e.keyCode === 13) { commitHabit(); }
          if (e.keyCode === 27) { activeHabitInputId = null; renderAll(); }
        }, false);

        habitForm.appendChild(hInput);
        habitForm.appendChild(hSave);
        habitForm.appendChild(hCancel);
        addHabitRow.appendChild(habitForm);

        window.setTimeout(function () { hInput.focus(); }, 50);
      } else {
        var addHabitBtn = document.createElement("div");
        addHabitBtn.className = "btn small";
        addHabitBtn.textContent = "+ Add Habit";
        addHabitBtn.addEventListener("click", function () {
          activeHabitInputId = routine.id;
          renderAll();
        }, false);
        addHabitRow.appendChild(addHabitBtn);
      }
      card.appendChild(addHabitRow);
    }

    return card;
  }

  function buildHabitRow(routine, habit) {
    var li = document.createElement("li");

    var isChecked = !!dayData.entries[habit.id];

    var box = document.createElement("div");
    box.className = isChecked ? "checkbox checked" : "checkbox";
    box.addEventListener("click", function () {
      dayData.entries[habit.id] = !dayData.entries[habit.id];
      if (dayData.entries[habit.id]) {
        markRoutineCompletionIfDone(routine);
      }
      persistLocalStorage();
      renderAll();
    }, false);

    var label = document.createElement("div");
    label.className = isChecked ? "habit-label done" : "habit-label";
    label.textContent = habit.label;

    var del = document.createElement("div");
    del.className = "habit-del";
    del.innerHTML = "&times;";
    wireStepConfirmButton(
      del,
      ["&times;"],
      function () {
        var idx = routine.habits.indexOf(habit);
        if (idx > -1) {
          routine.habits.splice(idx, 1);
          delete dayData.entries[habit.id];
          markRoutineCompletionIfDone(routine);
          persistLocalStorage();
          renderAll();
        }
      },
      "&times;",
      "habit-del",
      "habit-del"
    );

    li.appendChild(box);
    li.appendChild(label);
    li.appendChild(del);
    return li;
  }

  function renderWater() {
    var row = document.getElementById("waterRow");
    row.innerHTML = "";

    var currentCount = dayData.water || 0;
    var i;
    for (i = 1; i <= 4; i++) {
      var bottle = document.createElement("div");
      bottle.className = i <= currentCount ? "bottle filled" : "bottle";
      bottle.innerHTML = "&#x1F964;"; /* standard unicode water bottle icon */
      
      (function (index) {
        bottle.addEventListener("click", function () {
          if (dayData.water === index) {
            dayData.water = index - 1;
          } else {
            dayData.water = index;
          }
          if (dayData.water >= 4) {
            dayData.completedWater = true;
          }
          persistLocalStorage();
          renderAll();
        }, false);
      })(i);

      row.appendChild(bottle);
    }

    document.getElementById("waterCount").textContent = currentCount + " of 4 bottles standard goal met today";

    var wStreak = waterStreak();
    var wBadge = document.getElementById("waterStreak");
    wBadge.className = wStreak > 0 ? "water-streak" : "water-streak zero";
    wBadge.textContent = wStreak > 0
      ? "\uD83D\uDD25 " + wStreak + (wStreak === 1 ? " day streak" : " days streak")
      : "no water streak yet";
  }

  function renderAll() {
    renderRoutines();
    renderWater();
  }

  function trimStr(str) {
    if (!str) { return ""; }
    return str.replace(/^\s+|\s+$/g, '');
  }

  /* -------- Native File Export / Raw Text Box fallback -------- */

  function exportJson() {
    var dataStr = JSON.stringify(store, null, 2);
    
    // Fallback UI population automatically updates layout box
    document.getElementById("jsonText").value = dataStr;

    try {
      var blob = new Blob([dataStr], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "habits.json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setStatus("Exported successfully to habits.json", true);
    } catch (e) {
      document.getElementById("jsonBox").style.display = "block";
      setStatus("One-tap file saving failed. Copying raw text representation block manually below instead.", false);
    }
  }

  function toggleJsonBox() {
    var box = document.getElementById("jsonBox");
    if (box.style.display === "block") {
      box.style.display = "none";
    } else {
      box.style.display = "block";
      document.getElementById("jsonText").value = JSON.stringify(store, null, 2);
    }
  }

  function applyPastedJson() {
    var txt = document.getElementById("jsonText").value;
    var parsed = null;
    try {
      parsed = JSON.parse(txt);
    } catch (e) {
      setStatus("Invalid data syntax error. Please double check accuracy.", false);
      return;
    }

    if (looksLikeOldFormat(parsed)) {
      store = migrateOldFormat(parsed);
    } else {
      store = parsed;
      if (!store.routines) { store.routines = defaultRoutines(); }
      if (!store.days) { store.days = {}; }
    }
    ensureToday();
    persistLocalStorage();
    renderAll();
    document.getElementById("jsonBox").style.display = "none";
    setStatus("Successfully read structure entries file tracking applied!", true);
  }

  function handleFileSelect(e) {
    var files = e.target.files;
    if (!files || files.length === 0) { return; }
    var file = files[0];
    var reader = new FileReader();
    reader.onload = function (evt) {
      var txt = evt.target.result;
      var parsed = null;
      try {
        parsed = JSON.parse(txt);
      } catch (err) {
        setStatus("Could not read file structural settings. Invalid template.", false);
        return;
      }

      if (looksLikeOldFormat(parsed)) {
        store = migrateOldFormat(parsed);
      } else {
        store = parsed;
        if (!store.routines) { store.routines = defaultRoutines(); }
        if (!store.days) { store.days = {}; }
      }
      ensureToday();
      persistLocalStorage();
      renderAll();
      setStatus("Loaded custom data successfully!", true);
    };
    reader.readAsText(file);
  }

  /* -------- App Setup Hook initialization -------- */
  function init() {
    document.getElementById("appLogo").src = APP_LOGO_DATA_URI;
    document.getElementById("todayLabel").textContent = getTodayLabel();

    loadFromLocalStorage();

    document.getElementById("btnResetToday").addEventListener("click", resetAllToday, false);
    document.getElementById("btnSave").addEventListener("click", exportJson, false);
    document.getElementById("btnJson").addEventListener("click", toggleJsonBox, false);
    document.getElementById("btnApplyJson").addEventListener("click", applyPastedJson, false);

    document.getElementById("btnLoad").addEventListener("click", function () {
      document.getElementById("fileInput").click();
    }, false);
    document.getElementById("fileInput").addEventListener("change", handleFileSelect, false);

    document.getElementById("btnAddRoutine").addEventListener("click", function () {
      // Don't add multiple new unsaved fields concurrently
      var i;
      for (i = 0; i < store.routines.length; i++) {
        if (store.routines[i].isNew) { return; }
      }
      var newR = {
        id: makeId("r"),
        name: "",
        habits: [],
        isNew: true
      };
      store.routines.push(newR);
      renderAll();
    }, false);

    wireStepConfirmButton(
      document.getElementById("btnResetWaterStreak"),
      ["Are you sure?", "Tap once more to reset water streak"],
      function () {
        store.waterStreakResetBefore = getTodayKey();
        persistLocalStorage();
        renderAll();
        setStatus("Water logging calculation metrics reset.", true);
      },
      "Reset Streak",
      "btn small",
      "btn small gold"
    );

    renderAll();

    // Setup seamless midnight rollover processing triggers
    window.setInterval(checkDayRollover, 60000);
    if (typeof document.addEventListener !== "undefined") {
      document.addEventListener("visibilitychange", checkDayRollover, false);
    }
    window.addEventListener("focus", checkDayRollover, false);
  }

  window.addEventListener("load", init, false);

})();
</script>
</body>
</html>
